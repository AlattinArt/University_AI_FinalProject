<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>树院智管 · 登录</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{primary:{50:'#eff6ff',100:'#dbeafe',200:'#bfdbfe',300:'#93c5fd',400:'#60a5fa',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8',800:'#1e40af',900:'#1e3a8a'}}}}}</script>
<style>
body{background:linear-gradient(135deg,#eff6ff,#dbeafe,#bfdbfe);min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
.login-card{background:rgba(255,255,255,.85);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.3)}
.input-field{transition:all .3s}.input-field:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.15);transform:translateY(-1px)}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.float-anim{animation:float 6s ease-in-out infinite}
.float-anim-delay{animation:float 6s ease-in-out 2s infinite}
</style>
</head>
<body class="flex items-center justify-center p-4">
  <div class="flex w-full max-w-5xl gap-8 items-center">
    <div class="hidden lg:block flex-1">
      <div class="relative">
        <img src="assets/img/campus-bg.svg" alt="校园" class="w-full max-w-md mx-auto float-anim">
        <img src="assets/img/lab-equipment.svg" alt="实训" class="w-48 mx-auto mt-4 float-anim-delay opacity-80">
      </div>
      <h1 class="text-3xl font-bold text-primary-800 mt-6 text-center">树院智管</h1>
      <p class="text-primary-600 text-center mt-2">浙江树人学院 · 校园物资智能交互系统</p>
    </div>
    <div class="w-full max-w-md">
      <div class="login-card rounded-2xl shadow-xl p-8">
        <div class="text-center mb-6">
          <img src="assets/img/logo.svg" alt="校徽" class="w-16 h-16 mx-auto mb-3">
          <h2 class="text-xl font-bold text-primary-800">欢迎登录</h2>
          <p class="text-sm text-gray-500 mt-1">请使用校园账号登录系统</p>
        </div>
        <form id="loginForm" onsubmit="return handleLogin(event)">
          <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">账号</label>
            <input type="text" id="username" value="admin" class="input-field w-full px-4 py-2.5 border border-gray-300 rounded-xl text-sm focus:outline-none" placeholder="请输入学号/工号">
          </div>
          <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
            <input type="password" id="password" value="123456" class="input-field w-full px-4 py-2.5 border border-gray-300 rounded-xl text-sm focus:outline-none" placeholder="请输入密码">
          </div>
          <button type="submit" class="w-full py-2.5 bg-primary-800 hover:bg-primary-900 text-white rounded-xl font-medium text-sm transition-all hover:shadow-lg">登 录</button>
        </form>
        <div class="mt-4 text-center text-xs text-gray-400">
          <p>账号 admin / test / zhao，密码均为 123456</p>
          <p class="mt-1">本项目是浙江树人学院《人工智能》课程大作业</p>
        </div>
      </div>
    </div>
  </div>
  <script>
    function handleLogin(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const accounts = {
        admin: { pass: '123456', name: '管理员', role: 'admin' },
        test:  { pass: '123456', name: '测试用户', role: 'user' },
        zhao:  { pass: '123456', name: '赵老师', role: 'teacher' },
      };
      const account = accounts[username];
      if (!account || password !== account.pass) {
        const btn = document.querySelector('button[type="submit"]');
        btn.textContent = '账号或密码错误';
        btn.style.background = '#ef4444';
        setTimeout(() => { btn.textContent = '登 录'; btn.style.background = ''; }, 2000);
        return false;
      }
      localStorage.setItem('shuyuan_user', JSON.stringify({ name: account.name, role: account.role, avatar: account.name[0] }));
      window.location.href = 'stock-apply.html';
      return false;
    }
  </script>
</body>
</html>
