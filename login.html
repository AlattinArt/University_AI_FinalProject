<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>树院智管 · 校园物资智能管理系统</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{margin:0;min-height:100vh;background:linear-gradient(135deg,#0f172a,#1e3a8a,#1d4ed8);display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden;position:relative}

/* 方块雨 */
.block{position:absolute;width:28px;height:28px;border-radius:4px;opacity:0.85;transform:translateY(-120vh);animation:drop cubic-bezier(.22,.68,0,1.12) forwards}
.block:nth-child(odd){border-radius:50% 4px 50% 4px}
.block:nth-child(3n){border-radius:4px 50% 4px 50%}
@keyframes drop{0%{transform:translateY(-120vh) rotate(0);opacity:0}5%{opacity:1}80%{opacity:1}100%{transform:translateY(0) rotate(var(--r,0deg));opacity:var(--oa,0.3)}}

/* 内容 */
.splash{text-align:center;color:#fff;z-index:1;opacity:0;animation:contentIn 1s ease 2.2s forwards}
@keyframes contentIn{to{opacity:1}}
.logo{width:88px;height:88px;margin:0 auto 24px;opacity:0;transform:scale(0.3) rotate(-15deg);animation:logoIn 0.8s cubic-bezier(.34,1.56,.64,1) 2.4s forwards;filter:drop-shadow(0 0 20px rgba(255,255,255,.2))}
@keyframes logoIn{to{opacity:1;transform:scale(1) rotate(0)}}
.title{font-size:34px;font-weight:800;letter-spacing:3px;margin-bottom:8px;opacity:0;animation:slideUp 0.6s ease 2.7s forwards;text-shadow:0 0 40px rgba(59,130,246,.5)}
.sub{font-size:14px;opacity:0;animation:slideUp 0.6s ease 2.9s forwards}
.sub span{opacity:0.6}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.bar-wrap{width:220px;height:3px;background:rgba(255,255,255,.15);border-radius:2px;margin:36px auto 0;overflow:hidden;opacity:0;animation:fadeIn 0.5s ease 3.2s forwards}
.bar-fill{height:100%;width:0;background:linear-gradient(90deg,#60a5fa,#a78bfa);border-radius:2px;animation:load 1.8s ease-in-out 3.3s forwards}
@keyframes load{to{width:100%}}
@keyframes fadeIn{to{opacity:1}}
.hint{font-size:12px;opacity:0;margin-top:16px;animation:fadeIn 0.5s ease 4.2s forwards}
.hint span{opacity:0.5}

/* 浮动粒子 */
.particle{position:absolute;border-radius:50%;background:rgba(255,255,255,.12);animation:drift linear infinite;pointer-events:none}
@keyframes drift{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-10vh) scale(1);opacity:0}}
</style>
</head>
<body>
<div class="splash">
  <img src="assets/img/logo.svg" alt="校徽" class="logo">
  <div class="title">树院智管</div>
  <div class="sub"><span>浙江树人学院 · 校园物资智能交互系统</span></div>
  <div class="bar-wrap"><div class="bar-fill"></div></div>
  <div class="hint"><span>正在进入系统...</span></div>
</div>
<script>
const colors = ['#3b82f6','#60a5fa','#a78bfa','#818cf8','#6366f1','#2dd4bf','#38bdf8','#7c3aed','#4f46e5','#0ea5e9'];
// 方块
for(let i=0;i<35;i++){
  const b=document.createElement('div');b.className='block';
  const size=Math.random()*16+14;
  b.style.width=size+'px';b.style.height=size+'px';
  b.style.left=Math.random()*100+'%';b.style.top=Math.random()*60+5+'%';
  b.style.background=colors[Math.floor(Math.random()*colors.length)];
  b.style.setProperty('--r',(Math.random()*720-360)+'deg');
  b.style.setProperty('--oa',(Math.random()*0.25+0.12));
  b.style.animationDuration=(Math.random()*1.2+0.8)+'s';
  b.style.animationDelay=(Math.random()*1.8)+'s';
  document.body.appendChild(b);
}
// 粒子
for(let i=0;i<18;i++){
  const p=document.createElement('div');p.className='particle';
  const s=Math.random()*3+2;p.style.width=s+'px';p.style.height=s+'px';
  p.style.left=Math.random()*100+'%';
  p.style.animationDuration=(Math.random()*8+6)+'s';p.style.animationDelay=(Math.random()*6)+'s';
  document.body.appendChild(p);
}
setTimeout(()=>{location.href='index.html'},4800);
</script>
</body>
</html>
